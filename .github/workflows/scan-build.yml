name: scan-build

on: [push, pull_request]

jobs:
  scan-build:

    runs-on: ubuntu-24.04

    steps:
    - name: Install
      run: |
        sudo apt-get update -q
        sudo apt-get install clang-tools-18

    - uses: actions/checkout@v4

    - name: Scan-build
      run: |
        scan-build-18 --status-bugs -analyze-headers make -j`nproc`
